<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Management System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Student Management System</h1>
    <p class="subtitle">Live data from the local REST API</p>
  </header>

  <main>
    <section id="status" class="status"></section>

    <section class="summary-grid">
      <div class="summary-card">
        <strong>API Endpoint</strong>
        <p id="api-endpoint">Loading...</p>
      </div>
      <div class="summary-card">
        <strong>Student records</strong>
        <p id="student-count">0</p>
      </div>
      <div class="summary-card actions">
        <strong>Live update</strong>
        <button id="refresh-button" type="button">Refresh list</button>
      </div>
    </section>

    <section class="form-card">
      <div class="form-header">
        <strong>Add a new student</strong>
        <p class="hint">Create a student record and then delete it from the list.</p>
      </div>
      <form id="student-form">
        <div class="form-row">
          <label for="first-name">First name</label>
          <input id="first-name" name="first_name" type="text" required />
        </div>
        <div class="form-row">
          <label for="last-name">Last name</label>
          <input id="last-name" name="last_name" type="text" required />
        </div>
        <div class="form-row">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />
        </div>
        <div class="form-row">
          <label for="date-of-birth">Date of birth</label>
          <input id="date-of-birth" name="date_of_birth" type="date" />
        </div>
        <button id="create-button" type="submit">Create student</button>
      </form>
    </section>

    <table id="student-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Enrolled Since</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="student-rows">
        <!-- populated by app.js -->
      </tbody>
    </table>
  </main>

  <script src="app.js"></script>
</body>
</html>
